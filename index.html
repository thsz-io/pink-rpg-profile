<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thays' Adventure - Final Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root { --p-soft: #ffb6c1; --p-deep: #ff69b4; --white: #fff; }
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: 'Press Start 2P', cursive; background-color: var(--p-soft); }

        /* CURSOR PATINHA */
        #game-screen {
            width: 100vw; height: 100vh;
            background: url('Ativos/cenario.png') no-repeat center;
            background-size: cover; image-rendering: pixelated;
            position: relative;
            cursor: url('Ativos/cursor_aberto.png'), auto;
            transition: filter 0.5s ease;
        }

        .grabbing-cursor { cursor: url('Ativos/cursor_fechado.png'), grabbing !important; }
        button, .sprite { cursor: url('Ativos/cursor_aberto.png'), pointer; }
        
        /* EFEITO DE CÂMERA */
        .camera-focus { filter: blur(4px) brightness(0.7); }

        /* HUD RPG */
        #hud {
            position: absolute; top: 15px; left: 15px;
            display: flex; gap: 15px; z-index: 100;
        }
        .bar-container { width: 140px; height: 25px; background: rgba(0,0,0,0.5); border: 2px solid var(--white); overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        #hp-fill { background: var(--p-deep); width: 85%; }
        #mp-fill { background: #b0e0e6; width: 60%; }

        /* SPRITES */
        .sprite { position: absolute; image-rendering: pixelated; pointer-events: none; }
        #thays { width: 55px; height: 55px; background: url('Ativos/personagem.png') no-repeat center; background-size: contain; transition: transform 0.1s; }
        #black-cat { width: 35px; height: 35px; background: url('Ativos/gato.png') no-repeat center; background-size: contain; transition: all 0.5s ease; }

        /* POÇÃO MÁGICA */
        #potion {
            width: 35px; height: 35px; background: url('Ativos/pocao.png') no-repeat center; background-size: contain;
            left: 150px; top: 150px; position: absolute; cursor: pointer; animation: float 2s infinite ease-in-out;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        /* INVENTÁRIO (PERGAMINHO) */
        #inventory-overlay {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            display: none; justify-content: center; align-items: center; z-index: 200;
        }
        #scroll-img { width: 550px; animation: spin-in 2s forwards; }
        @keyframes spin-in { 0% { transform: scale(0) rotate(-720deg); } 100% { transform: scale(1) rotate(0deg); } }

        #close-scroll-btn {
            position: absolute; top: 120px; right: 280px; 
            padding: 8px 15px; background: var(--p-deep); color: #fff;
            border: 2px solid #fff; cursor: pointer; font-size: 10px; display: none;
        }

        /* TELA FINAL */
        #exit-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 300; color: var(--white);
        }
        .exit-msg { font-family: 'Great Vibes', cursive; font-size: 38px; color: var(--p-soft); }

    </style>
</head>
<body>

    <div id="game-screen">
        <div id="hud">
            <div class="bar-container"><div id="hp-fill" class="bar-fill"></div></div>
            <div class="bar-container"><div id="mp-fill" class="bar-fill"></div></div>
        </div>

        <div id="thays" class="sprite" style="left: 45%; top: 45%;"></div>
        <div id="black-cat" class="sprite"></div>
        <div id="potion" title="Clique ou pressione E para ver as estatísticas"></div>

        <div id="inventory-overlay">
            <img src="Ativos/pergaminho.png" id="scroll-img" alt="Profile Scroll">
            <button id="close-scroll-btn" onclick="sequenceExit()">CLOSE</button>
        </div>

        <div id="exit-screen">
            <p class="exit-msg">Thank you for visiting, Thays Souza!</p>
            <p style="font-size: 8px; margin-top: 20px;">[ Refresh to play again ]</p>
        </div>
    </div>

    <script>
        let px = window.innerWidth / 2;
        let py = window.innerHeight / 2;
        let catX = px + 40, catY = py + 40;
        const p = document.getElementById('thays');
        const cat = document.getElementById('black-cat');
        const potion = document.getElementById('potion');
        let missionActive = false;

        // Movimentação
        document.addEventListener('keydown', (e) => {
            if(missionActive) return;
            const step = 20;
            if(e.key === 'w' || e.key === 'ArrowUp') py -= step;
            if(e.key === 's' || e.key === 'ArrowDown') py += step;
            if(e.key === 'a' || e.key === 'ArrowLeft') { px -= step; p.style.transform = 'scaleX(-1)'; }
            if(e.key === 'd' || e.key === 'ArrowRight') { px += step; p.style.transform = 'scaleX(1)'; }
            
            p.style.left = px + 'px';
            p.style.top = py + 'px';

            // Gato segue com delay
            setTimeout(() => {
                cat.style.left = (px + 45) + 'px';
                cat.style.top = (py + 45) + 'px';
            }, 150);

            if(e.key === 'e' || e.key === 'E') checkInteract();
        });

        potion.addEventListener('click', openScroll);

        function checkInteract() {
            let dist = Math.hypot(px - 150, py - 150);
            if(dist < 90) openScroll();
        }

        function openScroll() {
            document.getElementById('game-screen').classList.add('camera-focus');
            document.getElementById('inventory-overlay').style.display = 'flex';
            setTimeout(() => { document.getElementById('close-scroll-btn').style.display = 'block'; }, 2500);
        }

        function sequenceExit() {
            document.getElementById('inventory-overlay').style.display = 'none';
            document.getElementById('exit-screen').style.display = 'flex';
        }

        // Mouse customizado
        const screen = document.getElementById('game-screen');
        document.addEventListener('mousedown', () => screen.classList.add('grabbing-cursor'));
        document.addEventListener('mouseup', () => screen.classList.remove('grabbing-cursor'));
    </script>
</body>
</html>
